name: Build APK

on:
  push:
    branches: [ main ]
    paths:
      - 'crates/**'
      - 'app/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Build peng-daemon
        run: |
          cd crates
          
          # 设置 NDK 工具链
          export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          
          # 列出可用的工具
          ls -la "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/" | head -20
          
          # 使用 clang（不带版本号）
          export TOOLCHAIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          export CC_aarch64_linux_android="${TOOLCHAIN}/bin/aarch64-linux-android-clang"
          export AR_aarch64_linux_android="${TOOLCHAIN}/bin/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${TOOLCHAIN}/bin/aarch64-linux-android-clang"
          
          cargo build --release --target aarch64-linux-android -p peng-daemon

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download Termux Bootstrap
        run: |
          # 下载最新的 Termux Bootstrap
          curl -L -o app/src/main/assets/bootstrap-aarch64.zip \
            "https://github.com/termux/termux-packages/releases/download/bootstrap-2026.07.12-r1%2Bapt.android-7/bootstrap-aarch64.zip"

      - name: Copy peng-daemon to assets
        run: |
          cp target/aarch64-linux-android/release/peng-daemon app/src/main/assets/

      - name: Build APK
        run: |
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: peng-agent-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: peng-agent-debug

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}